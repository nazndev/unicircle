name: Mobile Build (EAS)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: [ "mobile/**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: cd mobile && npm ci
      - name: Expo login
        run: npx expo login -u ${{ secrets.EXPO_USERNAME }} -p ${{ secrets.EXPO_PASSWORD }}
      - name: Build Android (Production)
        run: cd mobile && npx eas build --platform android --profile production --non-interactive
      - name: Build iOS (Production)
        run: cd mobile && npx eas build --platform ios --profile production --non-interactive


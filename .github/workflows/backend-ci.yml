name: Backend CI

on:
  push:
    branches: [ main ]
    paths: [ "backend/**" ]
  pull_request:
    paths: [ "backend/**" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd backend && npm ci
      - run: cd backend && npm run build
      - run: cd backend && npx prisma validate
      - run: cd backend && npm run test --if-present

